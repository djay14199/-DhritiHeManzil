<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wedding Invitation | Dhriti & Hemant</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@500;600;700;800&family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background-color: #0f0809;
            color: #333;
            scroll-behavior: smooth;
            overflow-x: hidden; /* Fixes horizontal shift */
        }

        .desktop-frame-wrapper {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background-color: #000000;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.85);
            margin: 0 auto; /* Centers the content */
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        #gate-container {
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 450px;
            height: 100vh;
            z-index: 9999;
            perspective: 1500px;
            overflow: hidden;
            background: #000;
            transition: opacity 1s, visibility 1s;
        }

        .door-half {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background-image: url('door.png');
            background-size: 200% 100%;
            background-repeat: no-repeat;
            transition: transform 2.2s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .door-left { left: 0; background-position: left center; transform-origin: left center; }
        .door-right { right: 0; background-position: right center; transform-origin: right center; }

        .gate-opened .door-left { transform: rotateY(-110deg); }
        .gate-opened .door-right { transform: rotateY(110deg); }
        .gate-opened .gate-ui-layer { opacity: 0; pointer-events: none; }

        #main-content {
            opacity: 0;
            visibility: hidden;
            width: 100%;
            transition: opacity 0.5s ease-in-out;
        }

        .content-active #main-content { opacity: 1; visibility: visible; }

        .invitation-section {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-position: center;
            background-size: cover;
            overflow: hidden;
        }

        .reveal-item { opacity: 0; transform: translateY(40px); transition: all 1.2s ease; }
        .reveal-item.revealed { opacity: 1; transform: translateY(0); }

        .glittery-rose-gold { background: linear-gradient(135deg, #e0a3ad 0%, #f9dce2 25%, #b2737c 50%, #f5cbd2 75%, #ca8a94 100%); background-size: 200% 200%; }
        .glittery-gold-text { background: linear-gradient(135deg, #eed083 0%, #d4af37 50%, #aa771c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <div class="desktop-frame-wrapper">

        <div id="gate-container">
            <div class="door-half door-left"></div>
            <div class="door-half door-right"></div>
            <div class="gate-ui-layer absolute inset-0 flex flex-col justify-between items-center py-20 px-6 z-20">
                <div class="text-center">
                    <span class="block font-serif text-2xl tracking-[6px] text-white font-bold">YOU'RE INVITED</span>
                </div>
                <button onclick="triggerGateOpen()" class="w-[75px] h-[75px] bg-white rounded-full flex justify-center items-center shadow-2xl animate-pulse">
                    <svg class="w-9 h-9 fill-[#c92a3b]" viewBox="0 0 32 32"><path d="M16 28.5s-12-7.31-12-14.5C4 9.13 7.82 5 12.5 5c2.9 0 5.48 1.57 6.94 4 1.46-2.43 4.04-4 6.94-4C30.93 5 34 9.13 34 14c0 7.19-12 14.5-12 14.5z"/></svg>
                </button>
            </div>
        </div>

        <div id="main-content">
            <section class="invitation-section bg-black">
                <video id="invitation-video" class="w-full h-full object-cover" muted playsinline>
                    <source src="video1.mp4" type="video/mp4">
                </video>
            </section>

            <section class="invitation-section bg-[#fffdf9] p-6 text-center">
                <h2 class="reveal-item font-serif text-5xl text-[#8a1426] mb-8">Dhriti & Hemant</h2>
                <canvas id="scratch-canvas" width="310" height="140" class="mx-auto rounded-xl shadow-xl bg-gray-300"></canvas>
            </section>
        </div>
    </div>

    <script>
        function triggerGateOpen() {
            const gate = document.getElementById('gate-container');
            gate.classList.add('gate-opened');
            document.body.classList.add('content-active');
            const video = document.getElementById('invitation-video');
            if (video) video.play().catch(() => {});
            setTimeout(() => { gate.style.display = 'none'; }, 2200);
        }

        // Intersection Observer for scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('revealed');
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal-item').forEach(el => observer.observe(el));
    </script>
</body>
</html>
